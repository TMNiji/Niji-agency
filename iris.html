<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niji · Iris — La voix de l'agence</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon_white.png" />
<style>
/* ── N27 (typo signature Niji) — self-hosted dans /public/fonts ── */
@font-face { font-family:'N27'; src:url('/fonts/N27-Thin.woff2') format('woff2');    font-weight:200; font-style:normal; font-display:swap; }
@font-face { font-family:'N27'; src:url('/fonts/N27-Light.woff2') format('woff2');   font-weight:300; font-style:normal; font-display:swap; }
@font-face { font-family:'N27'; src:url('/fonts/N27-Regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'N27'; src:url('/fonts/N27-Medium.woff2') format('woff2');  font-weight:500; font-style:normal; font-display:swap; }
@font-face { font-family:'N27'; src:url('/fonts/N27-Bold.woff2') format('woff2');    font-weight:700; font-style:normal; font-display:swap; }

@property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --blue:#0057FF; --blue-soft:#3D7BFF; --violet:#6A2BE0; --magenta:#C42A9A;
  --orange:#FF7A3D; --green:#2FD08A;
  --white:#F5F5F5; --muted:rgba(245,245,245,0.52); --faint:rgba(245,245,245,0.16);
  --line:rgba(245,245,245,0.12);
  --font:'N27',-apple-system,BlinkMacSystemFont,sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --serif:'Times New Roman', Georgia, serif;
}
html, body { width:100%; height:100%; overflow:hidden; }
body { display:flex; flex-direction:column; height:100vh; height:100dvh;
  font-family:var(--font); color:var(--white);
  -webkit-font-smoothing:antialiased; background:#0a0a0a; }

/* ── Fleur d'iris décomposée (canvas #fx) — cœur visuel ; le fond noir est retiré par blend ── */
.iris-orb { position:fixed; left:50%; top:44%; transform:translate(-50%,-50%); z-index:0;
  height:min(64.8vh, 684px); width:auto; max-width:150vw; pointer-events:none;
  mix-blend-mode:screen; will-change:transform, filter;
  /* léger fondu vignette pour fondre le bord du cadre vidéo dans le noir */
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, #000 60%, transparent 100%);
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, #000 60%, transparent 100%); }
/* Vidéo source (cachée mais décodée) — alimente le canvas décomposé #fx */
.vsrc { position:fixed; left:0; top:0; width:2px; height:2px; opacity:0.01; pointer-events:none; z-index:-1; }
/* Particules / pollen (canvas plein écran) */
#dust { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; mix-blend-mode:screen; }

/* Anneaux orbitaux (overlay façon export niji) — fins, irisés, en rotation lente */
.orbits { position:fixed; left:50%; top:48%; transform:translate(-50%,-50%); z-index:2; pointer-events:none;
  width:min(79.2vh,864px); height:min(79.2vh,864px); opacity:0.42; }
.orbits svg { width:100%; height:100%; overflow:visible; animation:orbspin 90s linear infinite; transform-origin:center; }
.orbits .o { fill:none; stroke:rgba(245,245,245,0.32); stroke-width:0.16;
  filter:drop-shadow(0.5px 0 rgba(255,40,70,0.5)) drop-shadow(-0.5px 0 rgba(50,120,255,0.5)); }
.orbits .node { fill:rgba(248,248,248,0.95);
  filter:drop-shadow(0 0 2.4px rgba(255,255,255,0.9)) drop-shadow(0.4px 0 rgba(255,40,70,0.6)) drop-shadow(-0.4px 0 rgba(50,120,255,0.6)); }
@keyframes orbspin { to { transform:rotate(360deg); } }

/* Couche "data" — chiffres normalisés épars qui glitchent (lecture machine / IA) */
.data { position:fixed; inset:0; z-index:2; pointer-events:none;
  font-family:ui-monospace,'SF Mono',Menlo,monospace; }
.data span { position:absolute; font-size:10px; letter-spacing:0.04em; color:rgba(245,245,245,0.30);
  white-space:nowrap; text-shadow:0 0 6px rgba(0,0,0,0.7); transition:opacity 0.25s ease; }

/* Voile gauche léger — lisibilité du titre par-dessus la vidéo */
.scrim { position:fixed; inset:0; z-index:1; pointer-events:none;
  background:linear-gradient(90deg, rgba(10,10,10,0.72) 0%, rgba(10,10,10,0) 24%); }

/* Bruit film — repris du site niji (modules/noise.js) : tuile 256px de pixels gris
   aléatoires (générée en JS), overlay STATIQUE, opacity 0.22, blend overlay. */
#noise { position:fixed; inset:0; z-index:2; pointer-events:none;
  background-repeat:repeat; background-size:256px 256px; opacity:0.22; mix-blend-mode:overlay; }

/* ── ENTRÉE CHORÉGRAPHIÉE ── */
@keyframes rise { from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
.brand-lockup { animation:rise 0.8s var(--ease) 0.10s backwards; }
.status-pill  { animation:rise 0.8s var(--ease) 0.20s backwards; }
.name         { animation:rise 0.8s var(--ease) 0.55s backwards; }
.subtitle     { animation:rise 0.8s var(--ease) 0.66s backwards; }
.divider      { animation:rise 0.8s var(--ease) 0.74s backwards; }
.presence     { animation:rise 0.8s var(--ease) 0.82s backwards; }
.actions      { animation:rise 0.8s var(--ease) 0.92s backwards; }
.themes       { animation:rise 0.8s var(--ease) 1.10s backwards; }

/* ── TOPBAR ── */
.topbar { position:fixed; top:0; left:0; right:0; z-index:4; display:flex; align-items:flex-start;
  justify-content:space-between; padding:40px clamp(28px,4vw,48px) 0; background:transparent; }
.brand-lockup { display:flex; align-items:center; gap:14px; }
.brand-link { display:block; line-height:0; transition:transform 0.2s var(--ease), filter 0.2s var(--ease); }
.brand-link:hover { transform:translateY(-1px); filter:brightness(1.08); }
.brand-mark { height:88px; width:88px; display:block; border-radius:0; box-shadow:0 4px 22px rgba(0,87,255,0.45); }
.brand-meta { font-size:9px; font-weight:500; letter-spacing:0.30em; text-transform:uppercase;
  color:var(--muted); padding-left:15px; border-left:1px solid var(--line); }
.status-pill { display:flex; align-items:center; gap:9px; margin-top:6px; font-size:15px;
  font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); transition:color 0.4s ease; }
.status-pill[data-state="ready"], .status-pill[data-state="active"] { color:var(--white); }
.status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0;
  transition:background 0.4s ease, box-shadow 0.4s ease; }
.status-pill[data-state="idle"]   .status-dot { background:var(--magenta); animation:dotpulse 1.4s ease-in-out infinite; }
.status-pill[data-state="ready"]  .status-dot { background:var(--green); box-shadow:0 0 10px rgba(47,208,138,0.7); }
.status-pill[data-state="active"] .status-dot { background:var(--blue); animation:ping 1.6s ease-out infinite; }
#status-text { transition:opacity 0.2s ease; }
.status-pill.fading #status-text { opacity:0; }
@keyframes dotpulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
@keyframes ping { 0%{box-shadow:0 0 0 0 rgba(0,87,255,0.55);} 100%{box-shadow:0 0 0 9px rgba(0,87,255,0);} }

/* ── STAGE — bloc texte ancré en bas, la cellule occupe le haut ── */
/* ── ZONES (compo niji : titre gauche · contrôles centre · cas d'usage bas-droite) ── */
.brand-title { position:fixed; left:clamp(32px,6vw,110px); top:50%; transform:translateY(-50%);
  z-index:3; text-align:left; }
.center-controls { position:fixed; left:50%; bottom:clamp(48px,11vh,140px); transform:translateX(-50%);
  z-index:3; display:flex; flex-direction:column; align-items:center; text-align:center; }

.name { font-size:clamp(80px,11vw,168px); font-weight:500; letter-spacing:-0.03em; line-height:0.86;
  color:var(--white); margin-bottom:6px; white-space:nowrap;
  animation: rise 0.8s var(--ease) 0.55s backwards;
  text-shadow:0.015em 0 rgba(255,52,72,0.28), -0.015em 0 rgba(60,130,255,0.28); }
.subtitle { font-size:clamp(32px,3.6vw,54px); font-weight:400; letter-spacing:-0.01em; text-transform:none;
  color:rgba(245,245,245,0.92); margin-bottom:34px; line-height:1.05; }
.subtitle em { font-family:var(--serif); font-style:italic; font-weight:400; letter-spacing:0; }
.divider { display:none; }

/* ── PRESENCE (texte d'état) ── */
.presence { position:relative; height:20px; width:100%; margin-top:24px;
  display:flex; align-items:center; justify-content:center; }
.state-text, .state-live { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  white-space:nowrap; font-size:16px; letter-spacing:0.26em; text-transform:uppercase; }
.state-text { font-weight:400; color:var(--muted); opacity:0; transition:opacity 0.8s ease-in-out; }
.state-text.show { opacity:1; }
.state-live { font-weight:600; color:var(--white); opacity:0; transition:opacity 0.4s; }
body.active .state-text { opacity:0 !important; }
body.active .state-live { opacity:1; }

/* ── CTA — glassmorphism + liquid glass au survol ── */
.actions { display:flex; flex-direction:column; align-items:center; }
.btn-primary { position:relative; overflow:hidden; padding:24px 56px; border-radius:16px;
  color:#fff; font-family:var(--font); font-size:18px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; cursor:pointer;
  background:rgba(12,14,22,0.55);
  border:1px solid rgba(255,255,255,0.22);
  -webkit-backdrop-filter:blur(18px) saturate(0.85); backdrop-filter:blur(18px) saturate(0.85);
  box-shadow:0 10px 34px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -10px 24px rgba(255,255,255,0.04);
  transition:transform 0.3s var(--ease), background 0.3s var(--ease), border-color 0.3s var(--ease), box-shadow 0.3s var(--ease); }
/* reflet liquide qui balaie au survol */
.btn-primary::before { content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:linear-gradient(115deg, transparent 28%, rgba(255,255,255,0.28) 47%, transparent 62%);
  transform:translateX(-130%); transition:transform 0.8s var(--ease); }
.btn-primary:hover::before { transform:translateX(130%); }
.btn-label { position:relative; z-index:1; display:inline-flex; align-items:center; gap:12px; }
.btn-primary .mic { display:block; transition:transform 0.3s var(--ease); }
.btn-primary:hover { background:rgba(22,26,40,0.5); border-color:rgba(255,255,255,0.5); transform:translateY(-2px);
  box-shadow:0 18px 46px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -12px 26px rgba(255,255,255,0.07); }
.btn-primary:hover .mic { transform:scale(1.08); }
.btn-primary:active { transform:translateY(0) scale(0.98); }
.btn-primary:focus-visible { outline:2px solid rgba(255,255,255,0.6); outline-offset:3px; }
.btn-primary[disabled] { opacity:0.5; cursor:wait; pointer-events:none; }

.btn-stop { display:none; align-items:center; gap:11px; padding:22px 50px; border-radius:10px;
  background:rgba(245,245,245,0.04); border:1px solid rgba(245,245,245,0.28); color:rgba(245,245,245,0.85);
  font-family:var(--font); font-size:18px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  cursor:pointer; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  transition:border-color 0.2s var(--ease),color 0.2s var(--ease),background 0.2s var(--ease),transform 0.2s var(--ease); }
.btn-stop:hover { border-color:rgba(245,245,245,0.7); color:#fff; background:rgba(245,245,245,0.08); transform:translateY(-2px); }
.btn-stop:focus-visible { outline:2px solid rgba(245,245,245,0.6); outline-offset:3px; }
.stop-sq { width:8px; height:8px; border-radius:1px; background:#F5F5F5; }
body.active .btn-primary { display:none; }
body.active .btn-stop { display:inline-flex; }

.error-msg { margin-top:18px; max-width:420px; text-align:center; font-size:15px; font-weight:400;
  letter-spacing:0.04em; line-height:1.5; color:var(--magenta); opacity:0; transition:opacity 0.3s ease; }
.error-msg.show { opacity:1; }

/* ── QUESTIONS SUGGÉRÉES ── */
.themes { position:fixed; right:clamp(28px,5vw,80px); bottom:clamp(36px,7vh,72px); z-index:3;
  text-align:right; transition:opacity 0.3s; }
body.active .themes { opacity:0.18; pointer-events:none; }
.themes-label { font-size:14px; font-weight:600; letter-spacing:0.26em; text-transform:uppercase;
  color:var(--muted); margin-bottom:15px; text-align:right; }
.chips { display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
.chip { padding:15px 24px; background:rgba(255,255,255,0.025); border:1px solid var(--line); border-radius:0;
  color:rgba(245,245,245,0.82); font-family:var(--font); font-size:16px; font-weight:400; letter-spacing:0.02em;
  cursor:pointer; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  transition:border-color 0.2s var(--ease), color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease); }
.chip:hover { border-color:rgba(245,245,245,0.6); color:#fff; background:rgba(245,245,245,0.06); transform:translateY(-2px); }
.chip:focus-visible { outline:1px solid rgba(245,245,245,0.7); outline-offset:2px; border-color:rgba(245,245,245,0.6); }

/* ── BADGE INFO ── */
.info-badge { position:fixed; right:18px; bottom:15px; z-index:50; opacity:0.4; transition:opacity 0.2s ease; cursor:default; }
.info-badge:hover { opacity:0.85; }
.info-i { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px;
  font-family:Georgia,serif; font-style:italic; font-size:14px; line-height:1; color:var(--white);
  border:1px solid rgba(245,245,245,0.5); border-radius:50%; }
.info-tip { position:absolute; right:0; bottom:26px; display:flex; align-items:center; gap:8px; white-space:nowrap;
  background:rgba(10,10,14,0.92); border:1px solid var(--line); border-radius:3px; padding:7px 11px;
  font-size:14px; font-weight:300; letter-spacing:0.08em; color:rgba(245,245,245,0.62);
  opacity:0; transform:translateY(4px); pointer-events:none;
  -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  transition:opacity 0.2s ease, transform 0.2s ease; }
.info-badge:hover .info-tip { opacity:1; transform:translateY(0); }

@media (max-width: 960px) {
  /* compo recentrée en colonne : titre haut · fleur centre · contrôles · questions bas-centre */
  .brand-title { left:50%; right:auto; transform:translateX(-50%); top:clamp(72px,11vh,128px); text-align:center; width:92vw; }
  .name { font-size:clamp(58px,13vw,104px); }
  .subtitle { font-size:clamp(22px,4.2vw,34px); }
  .iris-orb { height:min(43.2vh,468px); top:47%; }
  .center-controls { bottom:clamp(150px,27vh,300px); }
  .themes { right:auto; left:50%; transform:translateX(-50%); bottom:clamp(22px,4vh,46px); text-align:center; }
  .themes-label { text-align:center; }
  .chips { flex-direction:row; flex-wrap:wrap; justify-content:center; align-items:center; max-width:92vw; }
}

@media (max-width: 700px) {
  /* MOBILE : page scrollable, fleur en fond fixe, contenu empilé centré */
  html, body { height:auto; min-height:100dvh; overflow-x:hidden; overflow-y:auto; }
  body { display:block; }
  .topbar { padding:22px 18px 0; }
  .brand-mark { height:60px; width:60px; }
  .iris-orb { position:fixed; top:38%; height:34.2vh; opacity:0.5; }
  .brand-title { position:static; transform:none; width:auto; text-align:center; padding:104px 20px 0; }
  .name { font-size:clamp(54px,17vw,92px); }
  .subtitle { font-size:clamp(20px,5.4vw,30px); }
  .center-controls { position:static; transform:none; margin:44vh auto 0; padding:0 20px; width:100%; }
  .btn-primary { padding:18px 26px; font-size:16px; width:100%; max-width:360px; }
  .btn-stop { padding:16px 24px; font-size:16px; width:100%; max-width:360px; justify-content:center; }
  .btn-ghost { font-size:14px; margin-top:22px; }
  .themes { position:static; transform:none; margin:34px auto 56px; padding:0 20px; }
  .themes-label { text-align:center; }
  .chips { flex-direction:column; align-items:stretch; max-width:360px; margin:0 auto; }
  .chip { font-size:15px; text-align:center; }
}

@media (prefers-reduced-motion: reduce) {
  .brand-lockup,.status-pill,.name,.subtitle,.divider,.presence,.actions,.themes,.status-dot,.grain
  { animation:none !important; }
  .btn-primary::before { animation:none !important; }
}

/* ── MODE CHAT ÉCRIT ── */
.btn-ghost { margin-top:30px; background:none; border:none; color:var(--muted); cursor:pointer;
  font-family:var(--font); font-size:15px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  display:inline-flex; align-items:center; gap:8px; transition:color 0.2s var(--ease); }
.btn-ghost:hover { color:var(--white); }
.btn-ghost svg { display:block; }
body.active .btn-ghost, body.chat-open .btn-ghost { display:none; }
body.chat-open .brand-title, body.chat-open .center-controls, body.chat-open .themes { opacity:0; pointer-events:none; }
.brand-title, .center-controls, .themes { transition:opacity 0.4s ease; }
.iris-orb { transition:opacity 0.5s ease, transform 0.05s linear, filter 0.05s linear; }
body.chat-open .iris-orb { opacity:0.35; }
.chat { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0.98); z-index:6;
  width:min(640px,92vw); height:min(72vh,620px); display:flex; flex-direction:column;
  background:rgba(12,12,16,0.82); border:1px solid rgba(255,255,255,0.14); border-radius:18px; overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
  -webkit-backdrop-filter:blur(20px) saturate(1.3); backdrop-filter:blur(20px) saturate(1.3);
  opacity:0; pointer-events:none; transition:opacity 0.4s var(--ease), transform 0.4s var(--ease); }
body.chat-open .chat { opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
.chat-head { display:flex; align-items:center; gap:11px; padding:15px 18px; border-bottom:1px solid rgba(255,255,255,0.10); }
.chat-title { font-size:17px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--white); line-height:1.2; }
.chat-sub { font-size:13px; color:var(--muted); letter-spacing:0.10em; text-transform:uppercase; }
.chat-close { margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:22px;
  line-height:1; padding:2px 9px; border-radius:7px; transition:color 0.2s, background 0.2s; }
.chat-close:hover { color:var(--white); background:rgba(255,255,255,0.06); }
.chat-thread { flex:1; min-height:0; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
.chat-thread::-webkit-scrollbar { width:8px; }
.chat-thread::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:4px; }
.msg { max-width:82%; padding:13px 18px; border-radius:15px; font-size:19px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; }
.msg.user { align-self:flex-end; background:var(--blue); color:#fff; border-bottom-right-radius:5px; }
.msg.iris { align-self:flex-start; background:rgba(255,255,255,0.06); color:var(--white); border:1px solid rgba(255,255,255,0.10); border-bottom-left-radius:5px; }
.msg.typing { display:inline-flex; gap:5px; align-items:center; }
.msg.typing span { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:typing 1.2s ease-in-out infinite; }
.msg.typing span:nth-child(2){ animation-delay:0.2s; }
.msg.typing span:nth-child(3){ animation-delay:0.4s; }
@keyframes typing { 0%,60%,100%{ opacity:0.3; transform:translateY(0); } 30%{ opacity:1; transform:translateY(-3px); } }
.chat-input { display:flex; gap:10px; padding:14px; border-top:1px solid rgba(255,255,255,0.10); }
.chat-field { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.14); border-radius:11px;
  padding:15px 17px; color:var(--white); font-family:var(--font); font-size:18px; outline:none; transition:border-color 0.2s; }
.chat-field::placeholder { color:rgba(245,245,245,0.4); }
.chat-field:focus { border-color:var(--blue); }
.chat-send { flex-shrink:0; width:48px; border:none; border-radius:11px; cursor:pointer; color:#fff;
  background:linear-gradient(135deg, var(--blue), var(--magenta)); display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s var(--ease), box-shadow 0.2s; box-shadow:0 6px 20px rgba(0,87,255,0.35); }
.chat-send:hover { transform:translateY(-1px); box-shadow:0 8px 26px rgba(196,42,154,0.45); }
.chat-send:active { transform:scale(0.95); }
</style>
</head>
<body>

<video id="iris-video" class="vsrc" autoplay loop muted playsinline>
  <source src="/iris/fleur-web.mp4" type="video/mp4">
</video>
<canvas id="fx" class="iris-orb" width="1280" height="600"></canvas>
<div class="orbits" aria-hidden="true">
  <svg viewBox="-50 -50 100 100">
    <ellipse class="o" rx="48" ry="19" transform="rotate(18)"/>
