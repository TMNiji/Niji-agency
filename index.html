<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Niji — Agence digitale</title>
    <!-- Preload the two most-used N27 weights to avoid FOUT on first paint -->
    <link rel="preload" href="/fonts/N27-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/N27-Bold.woff2"    as="font" type="font/woff2" crossorigin>
    <!-- DotGothic16 (orbital dot labels + section tags) is self-hosted — see fonts.css -->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Glitchy boot overlay — painted before the JS bundle loads (see
         styles/preloader.css), then driven + dismissed by modules/preloader.js. -->
    <div id="preloader" role="status" aria-live="polite" aria-label="Chargement du site"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="preloader__inner">
        <button type="button" class="preloader__enter" disabled>
          <span class="preloader__enter-label">DISCOVER THE AGENCY</span>
        </button>
        <div class="preloader__bar"><span class="preloader__bar-fill"></span></div>
        <div class="preloader__meta">
          <span class="preloader__status">INITIALISATION</span>
          <span class="preloader__pct">00</span>
        </div>
      </div>
      <div class="preloader__scanlines" aria-hidden="true"></div>
    </div>
    <canvas id="webgl-canvas"></canvas>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
