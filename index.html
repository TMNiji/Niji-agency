        <h1>Niji — Agence française de product design AI-native</h1>
        <p>Niji est une agence française de product design AI-native. Elle conçoit, fabrique et opère des produits digitaux pour les entreprises&nbsp;: sites, applications, plateformes, services connectés et agents IA. Sa posture&nbsp;: <strong>force créative en build, exigence opérationnelle en run</strong>.</p>

        <h2>L'agence en chiffres</h2>
        <ul>
          <li>25 ans d'existence (fondée en septembre 2001 par Hugues Meili)</li>
          <li>1400 personnes en France, Espagne et Maroc — 11 sites opérationnels</li>
          <li>133 millions d'euros de chiffre d'affaires en 2025</li>
          <li>56 awards remportés entre 2020 et 2025 — Top 4 mondial des Lovie Awards et des Webby Awards</li>
        </ul>

        <h2>Offres</h2>
        <ul>
          <li>Conception et déploiement d'agents IA</li>
          <li>AI.COMMERCE — e-commerce désirable pour les humains, lisible pour les agents IA</li>
          <li>Refonte et création de sites et applications</li>
          <li>Product designer intégré</li>
          <li>Design system</li>
          <li>Accessibilité (RGAA, WCAG, European Accessibility Act)</li>
          <li>Branding et plateforme de marque</li>
        </ul>

        <h2>Quelques clients</h2>
