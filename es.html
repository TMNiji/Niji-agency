        <h1>Niji — Agencia de product design IA-nativa</h1>
        <p>Niji es una agencia de product design IA-nativa. Diseña, fabrica y opera productos digitales para empresas&nbsp;: sitios web, aplicaciones, plataformas, servicios conectados y agentes de IA. Su postura&nbsp;: <strong>crear lo que aún no existe, hacer crecer lo que ya funciona</strong>.</p>

        <h2>La agencia en cifras</h2>
        <ul>
          <li>25 años de existencia (fundada en septiembre de 2001 por Hugues Meili)</li>
          <li>1400 personas en Francia, España y Marruecos — 11 sedes operativas</li>
          <li>133 millones de euros de facturación en 2025</li>
          <li>56 premios obtenidos entre 2020 y 2025 — Top 4 mundial en los Lovie Awards y los Webby Awards</li>
        </ul>

        <h2>Servicios</h2>
        <ul>
          <li>Diseño y despliegue de agentes de IA</li>
          <li>AI.COMMERCE — e-commerce deseable para los humanos, legible para los agentes de IA</li>
          <li>Rediseño y creación de sitios web y aplicaciones</li>
          <li>Product designer integrado</li>
          <li>Design system</li>
          <li>Accesibilidad (RGAA, WCAG, European Accessibility Act)</li>
          <li>Branding y plataforma de marca</li>
        </ul>

        <h2>Algunos clientes</h2>
        <p>Lacoste, Relais &amp; Châteaux, Orange, BNP Paribas, Accor, RATP, Decathlon, Arte, Groupe Bel.</p>
