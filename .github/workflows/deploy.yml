name: Deploy to Vercel (Production)

# Auto-deploy on every push to main. Replaces the native Vercel↔GitHub
# integration (which the two-account GitHub setup couldn't link cleanly).
# Requires one repo secret: VERCEL_TOKEN (a Vercel access token).
on:
  push:
    branches: [main]

# Never run two production deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_DhxPlZB9ULYwGATYm2AjjOds
      VERCEL_PROJECT_ID: prj_X6WqxLRCbq9OT3FyhoPJBGhuhCtO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
